name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v5

      - name: Verify version stamps agree across pyproject, SKILL.md, and tag
        run: |
          PYPROJECT_VERSION=$(grep -E '^version\s*=\s*"' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SKILL_VERSION=$(grep -E '^version:\s*' skills/soultavern/SKILL.md | head -1 | sed -E 's/^version:\s*//' | tr -d '"')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "pyproject: $PYPROJECT_VERSION"
          echo "SKILL.md:  $SKILL_VERSION"
          echo "tag:       $TAG_VERSION"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ] || [ "$SKILL_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::version mismatch — pyproject.toml, SKILL.md frontmatter, and the git tag must all agree"
            exit 1
          fi

      - name: Build skills zip
        run: |
          zip -r soultavern-skills.zip skills/ -x '*.DS_Store'
          ls -lh soultavern-skills.zip

      - name: Create release with skills zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            soultavern-skills.zip \
            --title "$TAG" \
            --generate-notes
